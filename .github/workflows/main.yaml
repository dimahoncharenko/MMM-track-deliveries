name: Server CI

on:
  pull_request:
    branches: ["main"]

jobs:
  test-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./server/package-lock.json"

      - name: Install Dependencies
        run: |
          cd server
          npm install

      - name: Run NestJS Tests
        run: |
          cd server
          npm test
